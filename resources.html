<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQNet — Resources</title>
  <meta name="description" content="ResQNet Resources — Emergency contacts and community resources." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-layout { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem;
    }
    .top-nav-left { display: flex; align-items: center; gap: 1.5rem; }
    .nav-logo-link { font-size: 1.4rem; font-weight: 700; text-decoration: none; color: var(--text-main); }
    .back-link {
      color: var(--text-dim); text-decoration: none; font-size: 0.95rem;
      padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 8px; transition: 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    
    .grid-helplines {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 4rem;
    }
    .help-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between;
      text-decoration: none; transition: 0.2s;
    }
    .help-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
    .help-top { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
    .help-icon { font-size: 1.5rem; }
    .help-name { color: var(--text-dim); font-size: 0.95rem; font-weight: 500; }
    .help-num { color: var(--text-main); font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .btn-call {
      background: rgba(76, 175, 80, 0.1); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3);
      padding: 0.6rem; border-radius: 6px; text-align: center; font-weight: 600; font-size: 0.9rem;
    }
    .help-card:hover .btn-call { background: rgba(76, 175, 80, 0.2); }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    
    .res-list { display: flex; flex-direction: column; gap: 1rem; }
    .res-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
    }
    @media (max-width: 600px) {
      .res-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
    .res-title-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.4rem; }
    .res-name { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
    .res-type { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); }
    .res-meta { color: var(--text-dim); font-size: 0.9rem; }
    .res-contact {
      color: var(--accent-red); font-weight: 600; text-decoration: none; padding: 0.5rem 1rem;
      border: 1px solid rgba(163, 45, 45, 0.3); border-radius: 6px; background: rgba(163, 45, 45, 0.05);
    }
  </style>
</head>
<body style="overflow-y: auto;">

  <div class="page-layout">
    <header class="top-nav">
      <div class="top-nav-left">
        <a href="reporter.html" class="nav-logo-link">ResQNet</a>
        <a href="reporter.html" class="back-link">← Home</a>
      </div>
      <h1 style="font-size: 1.5rem;">Resources</h1>
    </header>

    <main>
      <section>
        <h2 style="margin-bottom: 1.5rem;">Emergency Helplines</h2>
        <div class="grid-helplines">
          <a href="tel:108" class="help-card">
            <div>
              <div class="help-top"><span class="help-icon">🚑</span><span class="help-name">Medical Emergency</span></div>
              <div class="help-num">108</div>
            </div>
            <div class="btn-call">Call now</div>
          </a>
          <a href="tel:100" class="help-card">
            <div>
              <div class="help-top"><span class="help-icon">🚓</span><span class="help-name">Police</span></div>
              <div class="help-num">100</div>
            </div>
            <div class="btn-call">Call now</div>
          </a>
          <a href="tel:101" class="help-card">
            <div>
              <div class="help-top"><span class="help-icon">🚒</span><span class="help-name">Fire Brigade</span></div>
              <div class="help-num">101</div>
            </div>
            <div class="btn-call">Call now</div>
          </a>
          <a href="tel:1078" class="help-card">
            <div>
              <div class="help-top"><span class="help-icon">🌊</span><span class="help-name">Disaster Relief (NDRF)</span></div>
              <div class="help-num">1078</div>
            </div>
            <div class="btn-call">Call now</div>
          </a>
          <a href="tel:03432546000" class="help-card">
            <div>
              <div class="help-top"><span class="help-icon">🏥</span><span class="help-name">Ambulance (Durgapur)</span></div>
              <div class="help-num">0343-2546000</div>
            </div>
            <div class="btn-call">Call now</div>
          </a>
        </div>
      </section>

      <section>
        <div class="section-header">
          <h2>Community Resources</h2>
          <button id="addResBtn" class="btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.9rem;">+ Add Resource</button>
        </div>
        
        <div id="resList" class="res-list">
          <p style="color: var(--text-dim); padding: 2rem 0;">Loading resources...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Add Resource Modal -->
  <div id="resModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="text-align:left;">
      <h2 style="margin-bottom: 1.5rem;">Add Community Resource</h2>
      <form id="resForm" style="display:flex; flex-direction:column; gap:1rem;">
        <div>
          <label style="display:block; margin-bottom:0.4rem; color:var(--text-dim); font-size:0.9rem;">Resource Name</label>
          <input type="text" id="rName" class="modal-textarea" style="height:auto; padding:0.8rem;" required />
        </div>
        <div>
          <label style="display:block; margin-bottom:0.4rem; color:var(--text-dim); font-size:0.9rem;">Type</label>
          <select id="rType" class="modal-textarea" style="height:auto; padding:0.8rem;" required>
            <option value="NGO">NGO</option>
            <option value="Medical">Medical Facility</option>
            <option value="Shelter">Shelter</option>
            <option value="Food">Food / Water</option>
          </select>
        </div>
        <div>
          <label style="display:block; margin-bottom:0.4rem; color:var(--text-dim); font-size:0.9rem;">Contact Number</label>
          <input type="tel" id="rContact" class="modal-textarea" style="height:auto; padding:0.8rem;" required />
        </div>
        <div>
          <label style="display:block; margin-bottom:0.4rem; color:var(--text-dim); font-size:0.9rem;">Address / Location</label>
          <input type="text" id="rAddress" class="modal-textarea" style="height:auto; padding:0.8rem;" required />
        </div>
        <div class="modal-footer" style="margin-top: 1rem;">
          <button type="submit" id="submitRes" class="btn-primary">Add Resource</button>
          <button type="button" id="cancelRes" class="btn-ghost">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="resources.js"></script>
</body>
</html>
