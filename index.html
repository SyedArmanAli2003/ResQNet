<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQNet — Crisis Response Platform</title>
  <meta name="description" content="ResQNet — Smart community crisis response. Report emergencies instantly or coordinate relief efforts in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --border: rgba(255,255,255,0.07);
      --red: #c0392b;
      --red-glow: rgba(192,57,43,0.35);
      --teal: #1abc9c;
      --teal-glow: rgba(26,188,156,0.3);
      --text: #f0f0f0;
      --muted: #7a8299;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,57,43,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 90%, rgba(26,188,156,0.10) 0%, transparent 60%),
        linear-gradient(180deg, #080b12 0%, #0a0f1e 100%);
    }
    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-block {
      text-align: center;
      margin-bottom: 12px;
    }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }
    .logo-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .logo-name {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #c8cdd8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-name span {
      background: linear-gradient(135deg, var(--red) 0%, #e74c3c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      margin-top: 12px;
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ── CTA CARDS ── */
    .cta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 680px;
      margin-top: 40px;
    }

    .cta-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
      border-radius: 16px;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .cta-card:hover { transform: translateY(-4px); }
    .cta-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .cta-card:hover::before { opacity: 1; }

    /* HELP card — red */
    .cta-help {
      background: linear-gradient(145deg, #1a0c0c, #1f1010);
      border-color: rgba(192,57,43,0.4);
      box-shadow: 0 0 0 0 var(--red-glow);
    }
    .cta-help:hover {
      box-shadow: 0 8px 40px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.05);
      border-color: rgba(192,57,43,0.7);
    }
    .cta-help::before { background: radial-gradient(ellipse at 50% 0%, rgba(192,57,43,0.1) 0%, transparent 70%); }

    /* COORDINATOR card — teal */
    .cta-coord {
      background: linear-gradient(145deg, #091a17, #0a1c18);
      border-color: rgba(26,188,156,0.3);
      box-shadow: 0 0 0 0 var(--teal-glow);
    }
    .cta-coord:hover {
      box-shadow: 0 8px 40px var(--teal-glow), inset 0 1px 0 rgba(255,255,255,0.05);
      border-color: rgba(26,188,156,0.6);
    }
    .cta-coord::before { background: radial-gradient(ellipse at 50% 0%, rgba(26,188,156,0.08) 0%, transparent 70%); }

    .cta-icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .cta-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .cta-help .cta-title { color: #ff8f8f; }
    .cta-coord .cta-title { color: #5ef0d8; }

    .cta-desc {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .cta-arrow {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.18s;
    }
    .cta-card:hover .cta-arrow { transform: translateX(4px); }
    .cta-help .cta-arrow { background: rgba(192,57,43,0.2); color: #ff8f8f; }
    .cta-coord .cta-arrow { background: rgba(26,188,156,0.15); color: #5ef0d8; }

    /* ── FOOTER PILLS ── */
    .footer-pills {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .pill-dot { width: 5px; height: 5px; border-radius: 50%; }
    .pill-dot.green { background: #2ecc71; }
    .pill-dot.blue  { background: #3498db; }
    .pill-dot.red   { background: var(--red); }

    /* ── MOBILE ── */
    @media (max-width: 540px) {
      html, body { overflow: auto; }
      .page { height: auto; min-height: 100vh; padding: 32px 16px 48px; justify-content: flex-start; }
      .cta-grid { grid-template-columns: 1fr; max-width: 360px; margin-top: 28px; }
      .logo-name { font-size: 3rem; }
    }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
</div>

<div class="page">

  <!-- LOGO -->
  <div class="logo-block">
    <div class="logo-badge">
      <span class="logo-dot"></span>
      CRISIS RESPONSE NETWORK
    </div>
    <h1 class="logo-name">Res<span>Q</span>Net</h1>
    <p class="tagline">Smart community resource allocation &amp; incident management</p>
  </div>

  <!-- CTA CARDS -->
  <div class="cta-grid">

    <a href="auth.html" class="cta-card cta-help" id="btnHelp">
      <div class="cta-icon">🆘</div>
      <div class="cta-title">I need help</div>
      <p class="cta-desc">Report an emergency, request resources, or send an SOS</p>
      <div class="cta-arrow">→</div>
    </a>

    <a href="coordinator.html" class="cta-card cta-coord" id="btnCoord">
      <div class="cta-icon">🎛️</div>
      <div class="cta-title">I'm a coordinator</div>
      <p class="cta-desc">Monitor live incidents and manage field response</p>
      <div class="cta-arrow">→</div>
    </a>

  </div>

  <!-- STATUS PILLS -->
  <div class="footer-pills">
    <div class="pill"><span class="pill-dot green"></span>System operational</div>
    <div class="pill"><span class="pill-dot blue"></span>Real-time sync</div>
    <div class="pill"><span class="pill-dot red"></span>Secure login</div>
  </div>

</div>

</body>
</html>
