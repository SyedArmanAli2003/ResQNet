<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQNet — Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b12; --surface: #0f1420; --border: rgba(255,255,255,0.08);
      --red: #c0392b; --text: #f0f0f0; --muted: #7a8299;
      --radius: 12px; --font: 'Inter', system-ui, sans-serif;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .auth-wrap { width: 100%; max-width: 460px; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo a { text-decoration: none; }
    .logo h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; color: var(--text); }
    .logo h1 span { color: var(--red); }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.8rem; }
    .tab-btn { flex: 1; padding: 0.9rem; background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--red); }
    .panel { display: none; flex-direction: column; gap: 1.1rem; }
    .panel.active { display: flex; }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; }
    input { width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--text);
      padding: 0.75rem 1rem; border-radius: 8px; font-family: inherit; font-size: 0.95rem; transition: border 0.2s; }
    input:focus { outline: none; border-color: rgba(255,255,255,0.2); }
    .forgot { font-size: 0.82rem; color: var(--muted); text-decoration: underline; cursor: pointer;
      text-align: right; background: none; border: none; font-family: inherit; }
    .forgot:hover { color: var(--text); }
    .btn-primary { width: 100%; padding: 0.85rem; background: var(--red); color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
    .btn-primary:hover { background: #a93226; }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .err { font-size: 0.83rem; color: #f09595; display: none; padding: 0.6rem 0.8rem;
      background: rgba(192,57,43,0.12); border-radius: 6px; border: 1px solid rgba(192,57,43,0.25); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(60px);
      background: #1abc9c; color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 9999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="logo">
      <a href="index.html"><h1>Res<span>Q</span>Net</h1></a>
      <p>Sign in or create an account to continue</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tabSignIn">Sign In</button>
        <button class="tab-btn" id="tabCreate">Create Account</button>
      </div>

      <!-- SIGN IN PANEL -->
      <div class="panel active" id="panelSignIn">
        <div>
          <label for="siEmail">Email</label>
          <input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div>
          <label for="siPassword">Password</label>
          <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="forgot" id="btnForgot">Forgot password?</button>
        <div class="err" id="siError"></div>
        <button class="btn-primary" id="btnSignIn">Sign In</button>
      </div>

      <!-- CREATE ACCOUNT PANEL -->
      <div class="panel" id="panelCreate">
        <div>
          <label for="regName">Full Name *</label>
          <input type="text" id="regName" placeholder="Jane Smith" autocomplete="name" />
        </div>
        <div>
          <label for="regEmail">Email *</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div>
          <label for="regPhone">Phone Number *</label>
          <input type="tel" id="regPhone" placeholder="+1 555 0100" autocomplete="tel" />
        </div>
        <div>
          <label for="regAddress">Address / Area *</label>
          <input type="text" id="regAddress" placeholder="Your neighbourhood or city" />
        </div>
        <div>
          <label for="regPass">Password (min 8 chars) *</label>
          <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div>
          <label for="regConfirm">Confirm Password *</label>
          <input type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="err" id="regError"></div>
        <button class="btn-primary" id="btnCreate">Create Account</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK (no module needed — compat versions work as globals) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    console.log('[auth.html] Script starting');

    // ── Firebase init ─────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyAgSylHSHd1KRN4SYNqG30cQkrGRfY2CCI",
      authDomain: "resqnet-e74e0.firebaseapp.com",
      projectId: "resqnet-e74e0",
      storageBucket: "resqnet-e74e0.firebasestorage.app",
      messagingSenderId: "206471236870",
      appId: "1:206471236870:web:807c01c54ef0adb332a287"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
      console.log('[auth.html] Firebase initialized');
    }

    const auth = firebase.auth();
    const db   = firebase.firestore();

    // ── Redirect if already signed in ────────────────────────────────────────
    auth.onAuthStateChanged((user) => {
      if (user) {
        console.log('[auth.html] Already signed in:', user.email, '— redirecting');
        window.location.href = 'reporter.html';
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      console.error('[auth]', id, msg);
    }
    function hideErr(id) { document.getElementById(id).style.display = 'none'; }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    function setLoading(btn, text, disabled) {
      btn.textContent = text;
      btn.disabled = disabled;
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.getElementById('tabSignIn').addEventListener('click', () => {
      document.getElementById('tabSignIn').classList.add('active');
      document.getElementById('tabCreate').classList.remove('active');
      document.getElementById('panelSignIn').classList.add('active');
      document.getElementById('panelCreate').classList.remove('active');
    });
    document.getElementById('tabCreate').addEventListener('click', () => {
      document.getElementById('tabCreate').classList.add('active');
      document.getElementById('tabSignIn').classList.remove('active');
      document.getElementById('panelCreate').classList.add('active');
      document.getElementById('panelSignIn').classList.remove('active');
    });

    // ── Sign In ───────────────────────────────────────────────────────────────
    document.getElementById('btnSignIn').addEventListener('click', async () => {
      console.log('[auth] Sign In clicked');
      hideErr('siError');
      const email    = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      if (!email || !password) { showErr('siError', 'Please enter your email and password.'); return; }

      const btn = document.getElementById('btnSignIn');
      setLoading(btn, 'Signing in…', true);

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        console.log('[auth] Signed in:', cred.user.email);

        // Cache profile
        const snap = await db.collection('users').doc(cred.user.uid).get();
        if (snap.exists) {
          sessionStorage.setItem('userProfile', JSON.stringify({ ...snap.data(), uid: cred.user.uid }));
        }
        window.location.href = 'reporter.html';
      } catch (err) {
        console.error('[auth] Sign in error:', err.code);
        setLoading(btn, 'Sign In', false);
        const msgs = {
          'auth/user-not-found':    'No account found with this email.',
          'auth/wrong-password':    'Incorrect password.',
          'auth/invalid-credential':'Invalid email or password.',
          'auth/invalid-email':     'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many failed attempts. Try again later.'
        };
        showErr('siError', msgs[err.code] || 'Sign in failed: ' + err.message);
      }
    });

    // ── Forgot Password ────────────────────────────────────────────────────────
    document.getElementById('btnForgot').addEventListener('click', async () => {
      const email = document.getElementById('siEmail').value.trim();
      if (!email) { showErr('siError', 'Enter your email address first.'); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        hideErr('siError');
        showToast('Password reset email sent!');
      } catch (err) {
        console.error('[auth] Forgot password error:', err.code);
        showErr('siError', 'Could not send reset email. Check the address and try again.');
      }
    });

    // ── Create Account ─────────────────────────────────────────────────────────
    document.getElementById('btnCreate').addEventListener('click', async () => {
      console.log('[auth] Create Account clicked');
      hideErr('regError');
      const name    = document.getElementById('regName').value.trim();
      const email   = document.getElementById('regEmail').value.trim();
      const phone   = document.getElementById('regPhone').value.trim();
      const address = document.getElementById('regAddress').value.trim();
      const pass    = document.getElementById('regPass').value;
      const confirm = document.getElementById('regConfirm').value;

      if (!name || !email || !phone || !pass || !confirm) { showErr('regError', 'Please fill in all required fields.'); return; }
      if (pass.length < 8) { showErr('regError', 'Password must be at least 8 characters.'); return; }
      if (pass !== confirm) { showErr('regError', 'Passwords do not match.'); return; }

      const btn = document.getElementById('btnCreate');
      setLoading(btn, 'Creating account…', true);

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        console.log('[auth] Account created:', cred.user.uid);

        await cred.user.updateProfile({ displayName: name });

        const profile = {
          uid: cred.user.uid, fullName: name, email: email,
          phone: phone, address: address || '', role: 'reporter',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          totalReports: 0, avatar: ''
        };
        await db.collection('users').doc(cred.user.uid).set(profile);
        console.log('[auth] Firestore profile saved');
        sessionStorage.setItem('userProfile', JSON.stringify({ ...profile, uid: cred.user.uid }));
        window.location.href = 'reporter.html';
      } catch (err) {
        console.error('[auth] Create error:', err.code);
        setLoading(btn, 'Create Account', false);
        const msgs = {
          'auth/email-already-in-use': 'This email is already registered. Try signing in.',
          'auth/invalid-email':        'Please enter a valid email address.',
          'auth/weak-password':        'Password is too weak. Use at least 8 characters.'
        };
        showErr('regError', msgs[err.code] || 'Registration failed: ' + err.message);
      }
    });

    console.log('[auth.html] All listeners attached');
  </script>
</body>
</html>
