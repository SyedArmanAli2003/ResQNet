<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQNet — Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; padding: 2rem; }
    .auth-container { width: 100%; max-width: 450px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .auth-tab { padding: 0.8rem 1rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; transition: 0.2s; }
    .auth-tab.active { color: var(--text); border-bottom-color: var(--red); }
    .auth-panel { display: none; flex-direction: column; gap: 1.2rem; }
    .auth-panel.active { display: flex; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label { font-size: 0.85rem; color: var(--muted); }
    .form-input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 6px; font-family: inherit; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
    .form-input:focus { border-color: rgba(255,255,255,0.2); outline: none; }
    .error-msg { font-size: 0.85rem; margin-top: 0.2rem; display: none; color: #F09595; }
    .forgot-link { color: var(--muted); font-size: 0.85rem; text-decoration: underline; text-align: right; cursor: pointer; }
    .btn-auth { background: white; color: black; border: none; padding: 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; margin-top: 0.5rem; width: 100%; }
    .btn-auth:hover { background: #e0e0e0; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" style="text-decoration:none">
        <h1 style="font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--text);">Res<span style="color:var(--red)">Q</span>Net</h1>
      </a>
      <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem;">Sign in or create an account</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-panel="signinPanel">Sign In</div>
      <div class="auth-tab" data-panel="signupPanel">Create Account</div>
    </div>

    <!-- Sign In Panel -->
    <div id="signinPanel" class="auth-panel active">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="signInEmail" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signInPassword" class="form-input" placeholder="••••••••" />
      </div>
      <div class="forgot-link" id="forgotPwdLink">Forgot password?</div>
      <div id="signInError" class="error-msg"></div>
      <button id="signInBtn" class="btn-auth">Sign In</button>
    </div>

    <!-- Create Account Panel -->
    <div id="signupPanel" class="auth-panel">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="regName" class="form-input" placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" id="regEmail" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input type="tel" id="regPhone" class="form-input" placeholder="+1 555 0100" />
      </div>
      <div class="form-group">
        <label class="form-label">Address / Area *</label>
        <input type="text" id="regAddress" class="form-input" placeholder="Your neighbourhood or city" />
      </div>
      <div class="form-group">
        <label class="form-label">Password (min 8 chars) *</label>
        <input type="password" id="regPassword" class="form-input" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" id="regConfirm" class="form-input" placeholder="••••••••" />
      </div>
      <div id="createError" class="error-msg"></div>
      <button id="createBtn" class="btn-auth">Create Account</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="auth.js" type="module"></script>
</body>
</html>
