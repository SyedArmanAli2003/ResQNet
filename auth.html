<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQNet — Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; padding: 2rem; }
    .auth-container { width: 100%; max-width: 450px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .auth-tab { padding: 0.8rem 1rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; transition: 0.2s; }
    .auth-tab.active { color: var(--text); border-bottom-color: var(--red); }
    .auth-form { display: none; flex-direction: column; gap: 1.2rem; }
    .auth-form.active { display: flex; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-label { font-size: 0.85rem; color: var(--muted); }
    .form-input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 6px; font-family: inherit; font-size: 0.95rem; }
    .form-input:focus { border-color: rgba(255,255,255,0.2); outline: none; }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.2rem; display: none; }
    .forgot-link { color: var(--muted); font-size: 0.85rem; text-decoration: underline; text-align: right; cursor: pointer; }
    .btn-auth { background: white; color: black; border: none; padding: 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; margin-top: 0.5rem; }
    .btn-auth:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="index.html" style="text-decoration:none">
        <h1 style="font-size: 2rem; font-weight: 900; letter-spacing: -1px; color: var(--text);">Res<span style="color:var(--red)">Q</span>Net</h1>
      </a>
      <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem;">Sign in or create an account</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-target="signin">Sign In</div>
      <div class="auth-tab" data-target="signup">Create Account</div>
    </div>

    <!-- Sign In Form -->
    <form id="signinForm" class="auth-form active">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="siEmail" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="siPassword" class="form-input" required />
      </div>
      <div class="forgot-link" id="forgotPwd">Forgot password?</div>
      <div id="siError" class="error-msg"></div>
      <button type="submit" class="btn-auth">Sign In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signupForm" class="auth-form">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="suName" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" id="suEmail" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number *</label>
        <input type="tel" id="suPhone" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Address / Area *</label>
        <input type="text" id="suAddress" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password (min 8 chars) *</label>
        <input type="password" id="suPassword" class="form-input" required minlength="8" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" id="suConfirm" class="form-input" required minlength="8" />
      </div>
      <div id="suError" class="error-msg"></div>
      <button type="submit" class="btn-auth" id="btnCreateAccount">Create Account</button>
    </form>
  </div>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="auth.js" type="module"></script>
</body>
</html>
