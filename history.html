<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQNet — History</title>
  <meta name="description" content="ResQNet History — View all reported incidents and emergencies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-layout { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .top-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem;
    }
    .top-nav-left { display: flex; align-items: center; gap: 1.5rem; }
    .nav-logo-link { font-size: 1.4rem; font-weight: 700; text-decoration: none; color: var(--text-main); }
    .back-link {
      color: var(--text-dim); text-decoration: none; font-size: 0.95rem;
      padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 8px; transition: 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; text-align: center;
    }
    .stat-val { font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }
    .stat-label { font-size: 0.9rem; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .filter-tabs {
      display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border);
    }
    .filter-tab {
      padding: 0.8rem 1rem; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; transition: 0.2s;
    }
    .filter-tab:hover { color: var(--text-main); }
    .filter-tab.active { color: var(--text-main); border-bottom-color: var(--accent-red); }
    
    .history-list { display: flex; flex-direction: column; gap: 1rem; }
    .history-card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; border-left-width: 4px; display: flex; flex-direction: column; gap: 0.8rem;
    }
    .hc-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .hc-title { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem; }
    .hc-time { font-size: 0.85rem; color: var(--text-dim); }
    .hc-loc { font-size: 0.9rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; }
    .hc-ai { font-size: 0.9rem; color: var(--text-dim); font-style: italic; background: rgba(255,255,255,0.03); padding: 0.8rem; border-radius: 6px; }
    
    .status-badge {
      font-size: 0.8rem; font-weight: 600; padding: 0.3rem 0.6rem; border-radius: 4px; border: 1px solid transparent;
    }
    .status-pending { color: #FBC02D; background: rgba(251, 192, 45, 0.1); border-color: rgba(251, 192, 45, 0.3); }
    .status-resolved { color: #4CAF50; background: rgba(76, 175, 80, 0.1); border-color: rgba(76, 175, 80, 0.3); }
  </style>
</head>
<body style="overflow-y: auto;">

  <div class="page-layout">
    <header class="top-nav">
      <div class="top-nav-left">
        <a href="reporter.html" class="nav-logo-link">ResQNet</a>
        <a href="reporter.html" class="back-link">← Home</a>
      </div>
      <h1 style="font-size: 1.5rem;">My Reports</h1>
    </header>

    <main>
      <section class="stats-row">
        <div class="stat-card">
          <div id="statTotal" class="stat-val">0</div>
          <div class="stat-label">Total Reports</div>
        </div>
        <div class="stat-card">
          <div id="statPending" class="stat-val" style="color: #FBC02D;">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div id="statResolved" class="stat-val" style="color: #4CAF50;">0</div>
          <div class="stat-label">Resolved</div>
        </div>
      </section>

      <section>
        <div class="filter-tabs" id="filterTabs">
          <div class="filter-tab active" data-status="all">All</div>
          <div class="filter-tab" data-status="pending">Pending</div>
          <div class="filter-tab" data-status="resolved">Resolved</div>
        </div>
        
        <div id="historyList" class="history-list">
          <p style="color: var(--text-dim); padding: 2rem 0;">Loading history...</p>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyAgSylHSHd1KRN4SYNqG30cQkrGRfY2CCI',
      authDomain: 'resqnet-e74e0.firebaseapp.com',
      projectId: 'resqnet-e74e0',
      storageBucket: 'resqnet-e74e0.firebasestorage.app',
      messagingSenderId: '206471236870',
      appId: '1:206471236870:web:807c01c54ef0adb332a287',
      measurementId: 'G-79KC3T537B'
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const historyList = document.getElementById('historyList');
    const filterTabs = document.querySelectorAll('.filter-tab');
    const statTotal = document.getElementById('statTotal');
    const statPending = document.getElementById('statPending');
    const statResolved = document.getElementById('statResolved');

    let activeFilter = 'all';

    async function ensureHistorySession() {
      if (auth.currentUser) return;
      await signInAnonymously(auth);
    }

    async function init() {
      try {
        await ensureHistorySession();
        listenToHistory();
      } catch (err) {
        historyList.innerHTML = '<p style="color: #ff6b6b; padding: 2rem 0;">Unable to connect to history service.</p>';
      }
    }
    init();

    function timeAgo(date) {
      if (!date) return 'just now';
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    function getSeverity(type) {
      switch (type) {
        case 'Medical': return { color: '#E53935', icon: '🏥' };
        case 'Disaster': return { color: '#F57C00', icon: '🌊' };
        case 'Conflict': return { color: '#FBC02D', icon: '⚔️' };
        case 'Resource': return { color: '#4CAF50', icon: '📦' };
        case 'Hospitality': return { color: '#757575', icon: '🏠' };
        default: return { color: '#A32D2D', icon: '🆘' };
      }
    }

    function listenToHistory() {
      const q = query(collection(db, 'incidents'), orderBy('timestamp', 'desc'));

      onSnapshot(q, (snapshot) => {
        historyList.innerHTML = '';
        let totalCount = 0;
        let pendingCount = 0;
        let resolvedCount = 0;
        let renderCount = 0;

        snapshot.forEach(docSnap => {
          totalCount++;
          const data = docSnap.data();
          const status = data.status || 'pending';
          if (status === 'resolved') resolvedCount++;
          else pendingCount++;

          if (activeFilter !== 'all' && status !== activeFilter) return;
          renderCount++;

          const severity = getSeverity(data.type);
          const timeStr = timeAgo(data.timestamp?.toDate());
          const statusBadge = status === 'resolved'
            ? '<span class="status-badge status-resolved">Resolved</span>'
            : '<span class="status-badge status-pending">Pending</span>';

          let aiSection = '';
          if (data.triageLevel !== null && data.triageLevel !== undefined) {
            aiSection = `<div class="hc-ai">AI Triage Level: ${data.triageLevel}</div>`;
          } else if (data.aiReasoning || data.triageReasoning) {
            aiSection = `<div class="hc-ai">${data.aiReasoning || data.triageReasoning}</div>`;
          }

          const card = document.createElement('div');
          card.className = 'history-card';
          card.style.borderLeftColor = severity.color;
          card.innerHTML = `
            <div class="hc-top">
              <div class="hc-title">${severity.icon} ${data.type || 'Emergency'}</div>
              <div class="hc-time">${timeStr}</div>
            </div>
            <div class="hc-loc">📍 ${data.location || 'Unknown location'}</div>
            <div>${statusBadge}</div>
            ${aiSection}
          `;
          historyList.appendChild(card);
        });

        statTotal.textContent = totalCount;
        statPending.textContent = pendingCount;
        statResolved.textContent = resolvedCount;

        if (renderCount === 0) {
          historyList.innerHTML = '<p style="color: var(--text-dim); padding: 2rem 0; text-align: center;">No incidents reported yet.</p>';
        }
      }, () => {
        historyList.innerHTML = '<p style="color: #ff6b6b; padding: 2rem 0;">Error loading history.</p>';
      });
    }

    filterTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        filterTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeFilter = tab.dataset.status;
        listenToHistory();
      });
    });

    const backLink = document.querySelector('.back-link');
    if (backLink) {
      backLink.href = 'reporter.html';
    }
  </script>
</body>
</html>
