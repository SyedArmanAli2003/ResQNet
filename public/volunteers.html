<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResQNet — Volunteers</title>
  <meta name="description" content="ResQNet Volunteers — Register to help or find active volunteers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Scoped styles for standalone pages */
    .page-layout {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-logo-link {
      font-size: 1.4rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--text-main);
    }
    .back-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: 0.2s;
    }
    .back-link:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
    }
    .form-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 3rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .input-group label {
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .form-input {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-family: inherit;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--text-dim);
    }
    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-main);
    }
    .vol-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .vol-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .vol-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--text-main);
      flex-shrink: 0;
    }
    .vol-info { flex-grow: 1; }
    .vol-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.2rem; }
    .vol-loc { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.8rem; }
    .vol-status-row { display: flex; align-items: center; justify-content: space-between; }
    .availability-dot {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px;
    }
    .dot-avail { background: var(--color-minor); box-shadow: 0 0 8px var(--color-minor); }
    .dot-busy { background: var(--color-critical); box-shadow: 0 0 8px var(--color-critical); }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="overflow-y: auto;">

  <div class="page-layout">
    <header class="top-nav">
      <div class="top-nav-left">
        <a href="reporter.html" class="nav-logo-link">ResQNet</a>
        <a href="reporter.html" class="back-link">← Home</a>
      </div>
      <h1 style="font-size: 1.5rem;">Volunteers</h1>
    </header>

    <main>
      <section class="form-card">
        <h2 style="margin-bottom: 1.5rem;">Register as Volunteer</h2>
        <form id="volForm">
          <div class="form-grid">
            <div class="input-group">
              <label for="volName">Full Name</label>
              <input type="text" id="volName" class="form-input" required />
            </div>
            <div class="input-group">
              <label for="volPhone">Phone Number</label>
              <input type="tel" id="volPhone" class="form-input" required />
            </div>
            <div class="input-group">
              <label for="volSkill">Primary Skill</label>
              <select id="volSkill" class="form-input" required>
                <option value="Medical">Medical / First Aid</option>
                <option value="Rescue">Rescue / Extraction</option>
                <option value="Supply">Supply / Logistics</option>
                <option value="Coordination">Coordination / Comms</option>
              </select>
            </div>
            <div class="input-group">
              <label for="location">Location <small id="locStatus" style="color:var(--text-dim)">(capturing...)</small></label>
              <input type="text" id="location" class="form-input" placeholder="Capturing GPS..." required />
            </div>
          </div>
          <div style="display:flex; justify-content: space-between; align-items: center;">
            <div class="input-group" style="flex-direction:row; align-items:center; gap:0.8rem;">
              <label for="volAvailable" style="color:var(--text-main); font-weight:500;">Currently Available?</label>
              <input type="checkbox" id="volAvailable" checked style="width:18px; height:18px; accent-color:var(--accent-red);" />
            </div>
            <button type="button" id="registerBtn" class="btn-primary" style="padding: 0.8rem 2rem;">Register</button>
          </div>
        </form>
      </section>

      <section>
        <h2 style="margin-bottom: 1rem;">Active Volunteers</h2>
        <div class="filter-row" id="volFilters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="medical">Medical</button>
          <button class="filter-btn" data-filter="rescue">Rescue</button>
          <button class="filter-btn" data-filter="supply">Supply</button>
        </div>
        
        <div id="volunteersList" class="vol-list">
          <p style="color: var(--text-dim); padding: 2rem 0;">Loading volunteers...</p>
        </div>
      </section>

      <!-- ── MY ASSIGNED TASKS (shown only when logged-in volunteer) ── -->
      <section id="myTasksSection" style="display:none; margin-top:3rem;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
          <h2 style="font-size:1.3rem;">My Assigned Tasks</h2>
          <span style="font-size:11px; padding:3px 10px; background:#0a1828; border:1px solid #185FA5; border-radius:999px; color:#B5D4F4; font-weight:600;">LIVE</span>
        </div>
        <div id="myTasks">
          <p style="color:#555; padding:1rem 0;">Loading tasks...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Mobile bottom tabs -->
  <nav class="coord-mobile-tabs" aria-label="Mobile navigation">
    <a href="reporter.html" class="coord-mobile-tab">Report</a>
    <a href="volunteers.html" class="coord-mobile-tab active">Volunteers</a>
    <a href="resources.html" class="coord-mobile-tab">Resources</a>
    <a href="history.html" class="coord-mobile-tab">History</a>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getFirestore, collection, addDoc, onSnapshot, serverTimestamp,
      where, orderBy, updateDoc, doc, query, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyAgSylHSHd1KRN4SYNqG30cQkrGRfY2CCI',
      authDomain: 'resqnet-e74e0.firebaseapp.com',
      projectId: 'resqnet-e74e0',
      storageBucket: 'resqnet-e74e0.firebasestorage.app',
      messagingSenderId: '206471236870',
      appId: '1:206471236870:web:807c01c54ef0adb332a287',
      measurementId: 'G-79KC3T537B'
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let unsubscribeVolunteers = null;
    let unsubscribeTasks = null;
    let capturedCoords = null;

    async function ensureVolunteerSession() {
      if (auth.currentUser) return;
      await signInAnonymously(auth);
    }

    // ── HELPER: relative time ─────────────────────────────────────────────
    function timeAgo(ts) {
      if (!ts) return 'just now';
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      const sec = Math.floor((Date.now() - date.getTime()) / 1000);
      if (sec < 60)   return `${sec}s ago`;
      if (sec < 3600) return `${Math.floor(sec / 60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec / 3600)}hr ago`;
      return `${Math.floor(sec / 86400)}d ago`;
    }

    // ── HELPER: triage level → color ──────────────────────────────────────
    function getLevelColor(level) {
      const map = { 1: '#A32D2D', 2: '#854F0B', 3: '#EF9F27', 4: '#3B6D11', 5: '#555555' };
      return map[level] || '#2a2d3a';
    }

    // ── HELPER: status label ──────────────────────────────────────────────
    function getStatusLabel(status) {
      const labels = {
        en_route:    'Volunteer is on the way',
        arrived:     'Volunteer has arrived at scene',
        unavailable: 'Volunteer unable to respond',
        resolved:    'Issue resolved on site',
        needs_help:  'Volunteer needs backup'
      };
      return labels[status] || status;
    }

    // ── ACTION BUTTONS per status ─────────────────────────────────────────
    function getVolunteerActions(incidentId, currentStatus) {
      if (!currentStatus || currentStatus === 'assigned') {
        return `
          <button onclick="window.updateVolunteerStatus('${incidentId}', 'en_route')"
            style="background:#185FA5;border:none;border-radius:6px;padding:7px 14px;
            font-size:11px;color:#B5D4F4;cursor:pointer;">
            🚗 I'm on my way
          </button>
          <button onclick="window.updateVolunteerStatus('${incidentId}', 'unavailable')"
            style="background:#1a0808;border:1px solid #3d1a1a;border-radius:6px;
            padding:7px 14px;font-size:11px;color:#F09595;cursor:pointer;">
            ✗ Can't respond
          </button>`;
      }
      if (currentStatus === 'en_route') {
        return `
          <button onclick="window.updateVolunteerStatus('${incidentId}', 'arrived')"
            style="background:#854F0B;border:none;border-radius:6px;padding:7px 14px;
            font-size:11px;color:#FAC775;cursor:pointer;">
            📍 I've arrived
          </button>`;
      }
      if (currentStatus === 'arrived') {
        return `
          <button onclick="window.resolveByVolunteer('${incidentId}')"
            style="background:#0F6E56;border:none;border-radius:6px;padding:7px 14px;
            font-size:11px;color:#9FE1CB;cursor:pointer;">
            ✅ Issue resolved
          </button>
          <button onclick="window.escalateByVolunteer('${incidentId}')"
            style="background:#A32D2D;border:none;border-radius:6px;padding:7px 14px;
            font-size:11px;color:#FCEBEB;cursor:pointer;">
            🆘 Need more help
          </button>`;
      }
      return '';
    }

    // ── LOAD MY ASSIGNED TASKS ────────────────────────────────────────────
    function loadMyTasks(uid, volunteerDocId = null) {
      if (unsubscribeTasks) unsubscribeTasks();

      const container = document.getElementById('myTasks');
      if (!container) return;

      // Robust listener: avoid composite-index dependency and support both
      // `assignedVolunteerUid` (new) and `assignedVolunteerId` (legacy).
      unsubscribeTasks = onSnapshot(collection(db, 'incidents'), (snapshot) => {
        const taskDocs = snapshot.docs
          .map(docSnap => ({ id: docSnap.id, ...docSnap.data() }))
          .filter(inc => {
            const matchByUid = inc.assignedVolunteerUid && inc.assignedVolunteerUid === uid;
            const matchByDocId = volunteerDocId && inc.assignedVolunteerId === volunteerDocId;
            return (matchByUid || matchByDocId) && inc.status !== 'resolved';
          })
          .sort((a, b) => {
            const aMs = a.timestamp?.toMillis?.() || 0;
            const bMs = b.timestamp?.toMillis?.() || 0;
            return bMs - aMs;
          });

        if (taskDocs.length === 0) {
          container.innerHTML = '<p style="color:#555;padding:1rem 0;">No active tasks assigned to you yet.<br><span style="font-size:11px;color:#444;">The coordinator will assign tasks based on your skill and location.</span></p>';
          return;
        }

        container.innerHTML = taskDocs.map(inc => {
          const id = inc.id;
          const borderColor = getLevelColor(inc.triageLevel);
          const statusLabel = inc.volunteerStatus || 'assigned';

          return `
            <div style="background:#13161f;border:1px solid #2a2d3a;border-radius:8px;
              padding:14px;margin-bottom:10px;border-left:3px solid ${borderColor}">

              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <span style="font-size:12px;font-weight:700;color:#f0f0f0;">${inc.type || 'Unknown'}</span>
                <span style="font-size:10px;background:${borderColor}22;color:${borderColor};
                  border:1px solid ${borderColor}44;border-radius:4px;padding:1px 6px;font-weight:600;">
                  Level ${inc.triageLevel || '?'}
                </span>
                <span style="font-size:10px;color:#555;margin-left:auto;">${timeAgo(inc.timestamp)}</span>
              </div>

              <div style="font-size:11px;color:#666;margin-bottom:6px;">📍 ${inc.location || 'Location unavailable'}</div>

              ${inc.triageReasoning ? `<div style="font-size:10px;color:#888;font-style:italic;
                margin-bottom:10px;line-height:1.4;">${inc.triageReasoning}</div>` : ''}

              <div style="font-size:10px;color:#888;margin-bottom:10px;">
                Status:
                <span id="status-${id}" style="color:#EF9F27;font-weight:600;">
                  ${statusLabel.replace('_', ' ').toUpperCase()}
                </span>
              </div>

              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                ${getVolunteerActions(id, inc.volunteerStatus)}
              </div>
            </div>`;
        }).join('');
      }, (err) => {
        console.warn('[MyTasks] listener error:', err.message);
        container.innerHTML = '<p style="color:#F09595;font-size:12px;">Could not load tasks right now. Please refresh and try again.</p>';
      });
    }

    async function getVolunteerDocIdForUid(uid) {
      try {
        const volQ = query(collection(db, 'volunteers'), where('uid', '==', uid));
        const snap = await getDocs(volQ);
        if (snap.empty) return null;
        return snap.docs[0].id;
      } catch (err) {
        console.warn('[MyTasks] could not resolve volunteer doc ID:', err.message);
        return null;
      }
    }

    // ── GLOBAL ACTION FUNCTIONS (called from innerHTML onclick) ───────────
    window.updateVolunteerStatus = async function(incidentId, newStatus) {
      try {
        await updateDoc(doc(db, 'incidents', incidentId), {
          volunteerStatus: newStatus,
          volunteerStatusUpdatedAt: serverTimestamp()
        });
        await addDoc(collection(db, 'incidents', incidentId, 'timeline'), {
          action: newStatus,
          actor: auth.currentUser?.email || 'volunteer',
          timestamp: serverTimestamp(),
          details: getStatusLabel(newStatus)
        });
        showToast('Status updated: ' + getStatusLabel(newStatus));
      } catch (err) {
        console.error('[Volunteer] Status update failed:', err);
        alert('Update failed: ' + err.message);
      }
    };

    window.resolveByVolunteer = async function(incidentId) {
      const notes = prompt('Add a resolution note (optional):', 'Issue resolved on site');
      if (notes === null) return; // user hit Cancel
      try {
        await updateDoc(doc(db, 'incidents', incidentId), {
          status:          'resolved',
          volunteerStatus: 'resolved',
          resolvedAt:      serverTimestamp(),
          resolvedBy:      auth.currentUser?.email || 'volunteer',
          resolutionNotes: notes || 'Resolved by volunteer'
        });
        await addDoc(collection(db, 'incidents', incidentId, 'timeline'), {
          action:    'resolved',
          actor:     auth.currentUser?.email || 'volunteer',
          timestamp: serverTimestamp(),
          details:   notes || 'Issue resolved on site by volunteer'
        });
        showToast('Incident marked as resolved ✅');
      } catch (err) {
        alert('Could not mark as resolved: ' + err.message);
      }
    };

    window.escalateByVolunteer = async function(incidentId) {
      const notes = prompt('Describe what additional help is needed:', '');
      if (notes === null) return;
      try {
        await updateDoc(doc(db, 'incidents', incidentId), {
          status:           'escalated',
          volunteerStatus:  'needs_help',
          escalatedAt:      serverTimestamp(),
          escalationNotes:  notes || 'Volunteer requested backup',
          escalatedBy:      auth.currentUser?.email || 'volunteer'
        });
        await addDoc(collection(db, 'incidents', incidentId, 'timeline'), {
          action:    'escalated',
          actor:     auth.currentUser?.email || 'volunteer',
          timestamp: serverTimestamp(),
          details:   notes || 'Volunteer needs backup'
        });
        showToast('🆘 Coordinators have been alerted!');
      } catch (err) {
        alert('Escalation failed: ' + err.message);
      }
    };

    function loadVolunteers(filter) {
      const listEl = document.getElementById('volunteersList');
      if (!listEl) return;

      listEl.innerHTML = '<p style="color:#555">Loading...</p>';

      if (unsubscribeVolunteers) unsubscribeVolunteers();

      unsubscribeVolunteers = onSnapshot(collection(db, 'volunteers'), (snapshot) => {
        let docs = snapshot.docs;

        docs = docs.sort((a, b) => {
          const aData = a.data() || {};
          const bData = b.data() || {};
          const aTs = aData.registeredAt || aData.timestamp;
          const bTs = bData.registeredAt || bData.timestamp;
          const aMs = aTs?.toMillis?.() || 0;
          const bMs = bTs?.toMillis?.() || 0;
          return bMs - aMs;
        });

        if (filter !== 'all') {
          docs = docs.filter(d => d.data().skill?.toLowerCase().includes(filter.toLowerCase()));
        }

        if (docs.length === 0) {
          listEl.innerHTML = '<p style="color:#555;padding:16px">No volunteers registered yet</p>';
          return;
        }

        listEl.innerHTML = docs.map(doc => {
          const v = doc.data();
          const initials = v.name?.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || '?';
          return `
            <div style="background:#13161f;border:1px solid #2a2d3a;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
              <div style="width:36px;height:36px;border-radius:50%;background:#A32D2D;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#FCEBEB;flex-shrink:0">${initials}</div>
              <div style="flex:1">
                <div style="font-size:12px;font-weight:500;color:#d0d0d0">${v.name || 'Unknown'}</div>
                <div style="font-size:10px;color:#555">${v.skill || 'No skill'} · ${v.location || 'No location'}</div>
              </div>
              <div style="display:flex;align-items:center;gap:4px">
                <div style="width:6px;height:6px;border-radius:50%;background:${v.available ? '#3B6D11' : '#854F0B'}"></div>
                <span style="font-size:10px;color:${v.available ? '#9FE1CB' : '#FAC775'}">${v.available ? 'Available' : 'Busy'}</span>
              </div>
            </div>`;
        }).join('');
      }, (err) => {
        listEl.innerHTML = '<p style="color:#F09595">Error loading volunteers: ' + err.message + '</p>';
      });
    }

    // ── AUTH STATE: show My Tasks for signed-in volunteers ───────────────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const section = document.getElementById('myTasksSection');
        if (section) section.style.display = 'block';
        const volunteerDocId = await getVolunteerDocIdForUid(user.uid);
        loadMyTasks(user.uid, volunteerDocId);
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await ensureVolunteerSession();
      } catch (err) {
        const listEl = document.getElementById('volunteersList');
        if (listEl) {
          listEl.innerHTML = '<p style="color:#F09595;padding:16px">Unable to connect to volunteer service. Enable Anonymous sign-in in Firebase Auth and refresh.</p>';
        }
        return;
      }

      loadVolunteers('all');

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            capturedCoords = { lat, lng };
            const locField = document.getElementById('location');
            if (locField) {
              locField.value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
              fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, { headers: { 'Accept-Language': 'en' } })
                .then(r => r.json())
                .then(d => {
                  if (d.display_name && locField) locField.value = d.display_name;
                })
                .catch(() => {});
            }
          },
          () => {
            const locField = document.getElementById('location');
            if (locField) locField.placeholder = 'Enter your location manually';
          }
        );
      }

      const registerBtn = document.getElementById('registerBtn');
      if (!registerBtn) return;

      registerBtn.addEventListener('click', async () => {
        const name = document.getElementById('volName')?.value?.trim();
        const phone = document.getElementById('volPhone')?.value?.trim();
        const skill = document.getElementById('volSkill')?.value;
        const location = document.getElementById('location')?.value?.trim();
        const available = document.getElementById('volAvailable')?.checked ?? true;

        if (!name || !phone || !skill) {
          alert('Please fill in name, phone and skill');
          return;
        }

        registerBtn.textContent = 'Registering...';
        registerBtn.disabled = true;

        try {
          await ensureVolunteerSession();

          await addDoc(collection(db, 'volunteers'), {
            name,
            phone,
            skill,
            location: location || 'Location not provided',
            coordinates: capturedCoords || null,
            available,
            uid: auth.currentUser?.uid || null,   // Firebase Auth UID for task matching
            registeredAt: serverTimestamp()
          });

          registerBtn.textContent = 'Registered!';
          registerBtn.style.background = '#0F6E56';
          document.getElementById('volName').value = '';
          document.getElementById('volPhone').value = '';

          setTimeout(() => {
            registerBtn.textContent = 'Register';
            registerBtn.style.background = '';
            registerBtn.disabled = false;
          }, 2000);
        } catch (err) {
          alert('Registration failed: ' + err.message);
          registerBtn.textContent = 'Register';
          registerBtn.disabled = false;
        }
      });

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadVolunteers(btn.dataset.filter || 'all');
        });
      });
    });

    // ── TOAST ────────────────────────────────────────────────────────────────
    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
